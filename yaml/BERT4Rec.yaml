# training settings
epochs: 100
train_batch_size: 2048 # 1024 for fashion
learner: adam
learning_rate: 0.001
eval_step: 1
stopping_step: 200
#训练过程中每个正样本对应的负样本数量
train_neg_sample_args: ~
#评估过程中每个正样本对应的负样本数量
#eval_neg_sample_num: 100

# evalution settings
metrics: ['Hit', 'NDCG', 'MRR']
#valid_metric: NDCG@10
eval_batch_size: 4096
weight_decay: 0.0
topk: [10]