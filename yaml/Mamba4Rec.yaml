# training settings
epochs: 50
train_batch_size: 2048
learner: adam
learning_rate: 0.001
eval_step: 1
stopping_step: 200
train_neg_sample_args: ~
show_progress: True

# evalution settings
metrics: ['Hit', 'NDCG', 'MRR']
valid_metric: NDCG@10
eval_batch_size: 4096
weight_decay: 0.0
topk: [10]
